<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estructura Dramática</title>
    <style>
        /* Estilo elegante */
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a1d 0%, #2d2d34 100%);
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 34px;
            margin: 0 0 5px 0;
            color: #d4af37;
            letter-spacing: 1.5px;
        }
        h2 {
            font-size: 22px;
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 15px;
            color: #a0a0a5;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        #contador {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 16px;
            color: #d4af37;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .tarjeta {
            background-color: #ffffff;
            color: #2c2c30;
            padding: 30px 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            margin-bottom: 35px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            line-height: 1.4;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            border-top: 4px solid #d4af37;
        }
        
        #imagen-jugador {
            max-width: 150px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            margin-bottom: 20px;
            display: none;
            object-fit: cover;
            width: 150px;
            height: 150px;
        }

        .botones {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }
        button {
            flex: 1;
            padding: 18px 10px;
            font-size: 17px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s, background-color 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-movimiento { background-color: #4a5568; }
        .btn-accion { background-color: #2b6cb0; }
        
        #btn-reiniciar {
            background-color: #1a1a1d;
            border: 2px solid #d4af37;
            color: #d4af37;
            display: none;
            margin-top: 20px;
            max-width: 380px;
            width: 100%;
        }
        #btn-reiniciar:hover {
            background-color: #d4af37;
            color: #1a1a1d;
        }

        #feedback {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 35px;
        }
    </style>
</head>
<body>

    <h1>Estructura Dramática</h1>
    <h2>¿Acción o Movimiento?</h2>
    
    <div id="contador"></div>

    <div class="tarjeta" id="contenedor-principal">
        <img src="" id="imagen-jugador" alt="Jugador Selección">
        <div id="texto-situacion"></div>
    </div>

    <div class="botones" id="contenedor-botones">
        <button class="btn-movimiento" onclick="verificar('movimiento')">Movimiento</button>
        <button class="btn-accion" onclick="verificar('accion')">Acción</button>
    </div>

    <button id="btn-reiniciar" onclick="location.reload()">Volver a intentar Misión</button>

    <div id="feedback"></div>

    <script>
        const situacionesBase = [
            // 20 MOVIMIENTOS
            { texto: "Caminar de un lado a otro en la habitación", tipo: "movimiento" },
            { texto: "Girar la muñeca repetidamente en círculos", tipo: "movimiento" },
            { texto: "Levantar los brazos hacia el techo", tipo: "movimiento" },
            { texto: "Soplar aire fuerte por la boca", tipo: "movimiento" },
            { texto: "Mover los dedos sobre la superficie de la mesa", tipo: "movimiento" },
            { texto: "Parpadear rápidamente mirando a la pared", tipo: "movimiento" },
            { texto: "Mover la cabeza de izquierda a derecha sin fijar la vista", tipo: "movimiento" },
            { texto: "Levantar una pierna y volver a bajarla", tipo: "movimiento" },
            { texto: "Encoger los hombros por un instante", tipo: "movimiento" },
            { texto: "Saltar en el lugar un par de veces", tipo: "movimiento" },
            { texto: "Flexionar las rodillas", tipo: "movimiento" },
            { texto: "Balancear los brazos al costado del cuerpo", tipo: "movimiento" },
            { texto: "Estirar el cuello hacia atrás", tipo: "movimiento" },
            { texto: "Abrir y cerrar las manos repetidamente", tipo: "movimiento" },
            { texto: "Desplazarse un par de pasos hacia adelante", tipo: "movimiento" },
            { texto: "Sentarse en la silla y pararse de inmediato", tipo: "movimiento" },
            { texto: "Rotar los tobillos en el aire", tipo: "movimiento" },
            { texto: "Inclinar el torso hacia adelante", tipo: "movimiento" },
            { texto: "Cruzar y descruzar las piernas", tipo: "movimiento" },
            { texto: "Llevarse la mano a la cara sin mirar", tipo: "movimiento" },

            // 20 ACCIONES
            { texto: "Caminar de un lado a otro para memorizar el guion del acto escolar", tipo: "accion" },
            { texto: "Levantar los brazos para acomodar los focos LED del escenario", tipo: "accion" },
            { texto: "Desarmar la canilla monocomando para cambiar el cuerito roto", tipo: "accion" },
            { texto: "Tocar el saxofón alto para ensayar las pistas de la banda", tipo: "accion" },
            { texto: "Poner agua en la cafetera para preparar el desayuno", tipo: "accion" },
            { texto: "Investigar precios en internet para viajar a Florianópolis", tipo: "accion" },
            { texto: "Abrir Canva para diseñar un logo que atraiga más clientes", tipo: "accion" },
            { texto: "Mover la cabeza de izquierda a derecha para negar una acusación en escena", tipo: "accion" },
            { texto: "Levantar la mano en la reunión para pedir la palabra", tipo: "accion" },
            { texto: "Saltar para alcanzar un libro de la repisa más alta", tipo: "accion" },
            { texto: "Leer en voz alta para practicar la pronunciación en inglés antes de un viaje", tipo: "accion" },
            { texto: "Conectar el dron a la batería para grabar la vista aérea", tipo: "accion" },
            { texto: "Acomodar los bancos del aula para armar un círculo de debate", tipo: "accion" },
            { texto: "Editar el video en Filmora para quitarle la marca de agua", tipo: "accion" },
            { texto: "Buscar figuritas para completar el álbum del Mundial", tipo: "accion" },
            { texto: "Caminar rápido por el aeropuerto para no perder el vuelo a Aruba", tipo: "accion" },
            { texto: "Pintar la baranda de metal para evitar que se oxide", tipo: "accion" },
            { texto: "Comprar una notebook nueva para acelerar la edición de video", tipo: "accion" },
            { texto: "Practicar los acordes en el ukelele para sacar una canción nueva", tipo: "accion" },
            { texto: "Abrir el ropero para buscar ropa limpia y ordenarla", tipo: "accion" }
        ];

        function mezclarArray(array) {
            let arrayMezclado = [...array];
            for (let i = arrayMezclado.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arrayMezclado[i], arrayMezclado[j]] = [arrayMezclado[j], arrayMezclado[i]];
            }
            return arrayMezclado;
        }

        const totalPreguntas = 10;
        let situaciones = mezclarArray(situacionesBase).slice(0, totalPreguntas);
        
        let indiceActual = 0;
        let puntaje = 0;

        const textoSituacion = document.getElementById('texto-situacion');
        const feedback = document.getElementById('feedback');
        const contador = document.getElementById('contador');
        const contenedorBotones = document.getElementById('contenedor-botones');
        const imgJugador = document.getElementById('imagen-jugador');
        const btnReiniciar = document.getElementById('btn-reiniciar');

        function cargarSituacion() {
            if (indiceActual < totalPreguntas) {
                textoSituacion.innerHTML = situaciones[indiceActual].texto;
                contador.textContent = `Pregunta ${indiceActual + 1} de ${totalPreguntas}`;
                feedback.textContent = ""; 
            } else {
                mostrarResultadoFinal();
            }
        }

        function mostrarResultadoFinal() {
            contador.style.display = 'none';
            contenedorBotones.style.display = 'none';
            feedback.textContent = "";
            
            imgJugador.style.display = 'block';
            btnReiniciar.style.display = 'block';
            
            let mensajeTotal = "";

            switch (puntaje) {
                case 10:
                    imgJugador.src = "https://upload.wikimedia.org/wikipedia/commons/b/b4/Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.jpg"; 
                    mensajeTotal = `<strong>¡Te sacaste un Messi!</strong><br><br>Un 10 absoluto. Campeón del Mundo dramático. Tu línea de acción fue perfecta.`;
                    break;
                case 9:
                    imgJugador.src = "imgJugador.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Angel_Di_Maria_2022.jpg/500px-Angel_Di_Maria_2022.jpg"; 
                    mensajeTotal = `¡90% Perfecto!<br><br>Como el fideo Di María en las finales. Apareciste cuando el conflicto dramático más lo necesitaba.`;
                    break;
                case 8:
                    imgJugador.src = "https://upload.wikimedia.org/wikipedia/commons/6/6b/Emiliano_Mart%C3%ADnez_2022_%28cropped%29.jpg"; 
                    mensajeTotal = `¡Sólido como el Dibu! 80% de efectividad.<br><br>¡Mirá cómo te como, Teatro! Resolviste la secuencia con autoridad táctica.`;
                    break;
                case 7:
                    imgJugador.src = "https://upload.wikimedia.org/wikipedia/commons/a/a2/Lionel_Scaloni_2022.jpg"; 
                    mensajeTotal = `¡70% Completado!<br><br>Liderazgo de Scaloni. Hay un proceso dramático en marcha y estás modificando el entorno.`;
                    break;
                default:
                    imgJugador.src = "https://upload.wikimedia.org/wikipedia/commons/2/23/Kylian_Mbapp%C3%A9_2022.jpg"; 
                    mensajeTotal = `<strong>¡Desaprobado! ${puntaje * 10}%</strong><br><br>Estás como Francia... te faltó acción dramática y te quedaste solo en el movimiento. ¡A volver a entrenar! 🇫🇷🏃‍♂️💨`;
                    break;
            }

            textoSituacion.innerHTML = mensajeTotal;
        }

        function verificar(respuestaAlumno) {
            const respuestaCorrecta = situaciones[indiceActual].tipo;

            if (respuestaAlumno === respuestaCorrecta) {
                feedback.textContent = "¡Correcto! ✔️";
                feedback.style.color = "#48bb78"; 
                puntaje++;
            } else {
                feedback.textContent = "Incorrecto ❌";
                feedback.style.color = "#f56565"; 
            }
            
            contenedorBotones.style.pointerEvents = 'none';
            contenedorBotones.style.opacity = '0.5';

            indiceActual++;
            
            setTimeout(() => {
                cargarSituacion();
                contenedorBotones.style.pointerEvents = 'auto';
                contenedorBotones.style.opacity = '1';
            }, 1200);
        }

        cargarSituacion();
    </script>
</body>
</html>
